spring:
  datasource:
    url: jdbc:mysql://localhost:3306/attendance_manager?allowPublicKeyRetrieval=true&allowMultiQueries=true&characterEncoding=UTF-8&characterSetResults=UTF-8&zeroDateTimeBehavior=convertToNull&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: GMT+8

mybatis:
  mapper-locations: classpath:com/zpark/sb/mapper/*.xml
logging:
  level:
    com.zpark.sb.dao: debug
server:
  port: 9331
attendance:
  on-time: '08:30'
  off-time: '17:30'
aliyun:
  oss:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    bucket: attendance1
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    public-url-prefix: https://attendance1.oss-cn-hangzhou.aliyuncs.com
    avatar-dir: avatar
